server:
  port: "8080"
  # unix_socket: "/run/msgflow/msgflow.sock"
  token: "your-secret-token"
  default_channels:
    - default
  alert_channels:
    - alert
  log_level: "error"
  retry: 2
  duplicate_window_seconds: 10

notifiers:
  bark_phone:
    type: "bark"
    server_url: "https://api.day.app"
    device_key: "your-phone-device-key"
    max_concurrency: "2"
    min_interval_ms: "500"

  bark_tablet:
    type: "bark"
    server_url: "https://api.day.app"
    device_key: "your-tablet-device-key"

  email_ops:
    type: "email"
    smtp_host: "smtp.example.com"
    smtp_port: "465"
    smtp_user: "sender@example.com"
    smtp_pass: "your-password"
    smtp_tls: "true"
    from: "sender@example.com"
    default_to: "ops@example.com"

  email_audit:
    type: "email"
    smtp_host: "smtp.example.com"
    smtp_port: "465"
    smtp_user: "sender@example.com"
    smtp_pass: "your-password"
    smtp_tls: "true"
    from: "sender@example.com"
    default_to: "audit@example.com"

  wecom_notice:
    type: "wecom"
    corp_id: "your-corp-id"
    agent_id: "1000001"
    corp_secret: "your-corp-secret"
    default_to_user: "@all"
    max_concurrency: "1"
    min_interval_ms: "1000"
    # base_url: "https://qyapi.weixin.qq.com"

  wecom_alert:
    type: "wecom"
    corp_id: "your-corp-id"
    agent_id: "1000002"
    corp_secret: "your-other-corp-secret"
    default_to_user: "@all"
    max_concurrency: "1"
    min_interval_ms: "1000"

groups:
  default:
    - bark_phone
  ops:
    - wecom_notice
  alert:
    - wecom_alert
    - bark_tablet
